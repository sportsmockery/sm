name: SEO audit

on:
  pull_request:
    paths:
      - 'src/app/**'
      - 'src/components/**'
      - 'src/lib/seo/**'
      - 'src/middleware.ts'
      - 'src/app/sitemaps/**'
      - 'src/app/sitemap_index.xml/**'
      - 'src/app/news-sitemap.xml/**'
  schedule:
    # 09:00 America/Chicago (CDT = 14:00 UTC)
    - cron: '0 14 * * *'
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run SEO audit script (canonical / schema / title / meta / hardcoded hosts)
        env:
          STAGING_HOST: https://test.sportsmockery.com
        run: npx tsx scripts/seo-audit.ts || true

      - name: Build URL list for broken-link check
        run: |
          mkdir -p audit
          if [ -f audit/report.md ]; then
            echo "audit/report.md exists"
          fi
          curl -fsS https://test.sportsmockery.com/sitemap_index.xml \
            | grep -oE 'https://[^<]+' \
            > audit/sitemap-urls.txt || true
          wc -l audit/sitemap-urls.txt || true

      - name: Lychee broken-link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --format json
            --output audit/lychee.json
            --max-concurrency 4
            audit/sitemap-urls.txt
          fail: false

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: seo-audit
          path: audit/
          retention-days: 30
