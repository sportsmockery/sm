<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>Edge | Masters 2026 Intelligence</title>
    <meta name="description" content="Edge Intelligence — Where consensus is weakest and where edge hides. 93 Players, 679 Historical Records, 50+ Variables, 10 Statistical Models" />
    <link rel="icon" type="image/x-icon" href="/masters/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;500;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/masters/assets/index-9mNnDLEv.js"></script>
    <link rel="stylesheet" crossorigin href="/masters/assets/index-YKKsWlzD.css">
    <link rel="stylesheet" href="/masters/assets/masters-theme.css">
    <link rel="stylesheet" href="/masters/assets/edge-enhance.css">
    <link rel="stylesheet" href="/masters/assets/benjamin-jonson.css">
    <style>
      /* Hero background — Augusta National, full screen */
      body {
        background: url('/masters/assets/masters-bg.png') center center / cover no-repeat fixed !important;
        background-attachment: fixed !important;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 0;
        background: linear-gradient(
          180deg,
          rgba(0, 12, 6, 0.72) 0%,
          rgba(0, 12, 6, 0.65) 40%,
          rgba(0, 12, 6, 0.80) 100%
        );
        pointer-events: none;
      }
      /* Make SPA content transparent so bg shows through on briefing */
      body:not(.on-dashboard) #root {
        background: transparent !important;
      }
      body:not(.on-dashboard) #root > * {
        background: transparent !important;
      }
      body:not(.on-dashboard) #root section[class*="min-h-screen"] {
        background: transparent !important;
      }
      /* Dashboard pages get their own opaque bg */
      body.on-dashboard {
        background: hsl(160 25% 5%) !important;
      }
      body.on-dashboard::before {
        display: none;
      }

      /* Edge logo — centered top, 30% size, fades fast on scroll */
      .edge-top-logo {
        position: fixed;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0px;
        transition: opacity 0.15s ease;
      }
      .edge-top-logo img {
        height: auto;
        width: 150px;
        max-width: 150px;
        position: relative;
      }
      /* Green light sweep — disabled on front/briefing page, only on dashboard */
      .edge-logo-sweep {
        position: relative;
        display: inline-block;
      }

      .edge-top-logo .edge-masters-logo {
        height: auto;
        width: 400px;
        max-width: 400px;
        margin-top: 20px;
        opacity: 0.85;
      }
      .edge-top-logo.scrolled {
        opacity: 0;
        pointer-events: none;
      }
      @media (max-width: 640px) {
        .edge-top-logo img { height: auto; width: 100px; max-width: 100px; }
        .edge-top-logo { top: max(6px, env(safe-area-inset-top, 6px)); }
        .edge-top-logo .edge-masters-logo { width: min(260px, 70vw); max-width: min(260px, 70vw); margin-top: 12px; }
      }
      @media (max-width: 375px) {
        .edge-top-logo img { height: auto; width: 80px; max-width: 80px; }
        .edge-top-logo .edge-masters-logo { width: min(220px, 65vw); max-width: min(220px, 65vw); margin-top: 10px; }
      }
      /* Only show on briefing/home page, hide on dashboard */
      body.on-dashboard .edge-top-logo {
        display: none;
      }

      /* Push briefing hero content down so it doesn't overlap with Edge + Masters lockup */
      body:not(.on-dashboard) section[class*="min-h-screen"][class*="justify-center"] {
        padding-top: 220px !important;
        justify-content: flex-start !important;
        padding-bottom: 60px !important;
      }
      @media (max-width: 640px) {
        body:not(.on-dashboard) section[class*="min-h-screen"][class*="justify-center"] {
          padding-top: 168px !important;
        }
      }

      /* Comet background animation */
      .bg-comets {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .comet {
        position: absolute;
        width: 2px;
        height: 2px;
        border-radius: 50%;
        background: hsl(187 85% 55%);
        box-shadow:
          0 0 4px 1px hsla(187, 85%, 55%, 0.6),
          0 0 12px 2px hsla(187, 85%, 55%, 0.3);
        left: var(--start-x);
        top: var(--start-y);
        opacity: 0;
        animation: comet-fly var(--duration) var(--delay) linear infinite;
      }
      .comet::after {
        content: '';
        position: absolute;
        top: 50%;
        right: 0;
        transform: translateY(-50%) rotate(var(--angle));
        transform-origin: right center;
        width: 60px;
        height: 1px;
        background: linear-gradient(to left, hsla(187, 85%, 55%, 0.5), transparent);
      }
      .comet.gold {
        background: hsl(51 100% 50%);
        box-shadow:
          0 0 4px 1px hsla(51, 100%, 50%, 0.6),
          0 0 12px 2px hsla(51, 100%, 50%, 0.3);
      }
      .comet.gold::after {
        background: linear-gradient(to left, hsla(51, 100%, 50%, 0.4), transparent);
      }
      @keyframes comet-fly {
        0% {
          opacity: 0;
          transform: translate(0, 0);
        }
        5% {
          opacity: 0.8;
        }
        70% {
          opacity: 0.6;
        }
        100% {
          opacity: 0;
          transform: translate(var(--travel-x), var(--travel-y));
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .comet { animation: none; opacity: 0; }
        .edge-logo-sweep::after { animation: none; }
      }

      /* Ensure app content sits above bg overlay and comets */
      #root { position: relative; z-index: 1; }
      .bg-comets { z-index: 0; }

      /* Sidebar Edge logo — handled by masters-theme.css */

      /* Search box — fix icon/input alignment */
      input[type="search"] {
        -webkit-appearance: none !important;
        appearance: none !important;
        box-sizing: border-box !important;
      }
      input[type="search"]::-webkit-search-decoration,
      input[type="search"]::-webkit-search-cancel-button,
      input[type="search"]::-webkit-search-results-button,
      input[type="search"]::-webkit-search-results-decoration {
        -webkit-appearance: none !important;
        display: none !important;
      }

      /* Dashboard button — top-right, subtle, briefing page only */
      .edge-dashboard-btn {
        position: fixed;
        top: 18px;
        left: 20px;
        z-index: 9999;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        border-radius: 8px;
        border: 1px solid hsla(160, 18%, 30%, 0.4);
        background: hsla(160, 18%, 10%, 0.5);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        color: hsla(40, 15%, 90%, 0.6);
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-decoration: none;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .edge-dashboard-btn:hover {
        border-color: hsla(51, 100%, 50%, 0.3);
        color: hsla(40, 15%, 90%, 0.9);
        background: hsla(160, 18%, 14%, 0.6);
      }
      .edge-dashboard-btn svg {
        width: 14px;
        height: 14px;
        opacity: 0.6;
      }
      body.on-dashboard .edge-dashboard-btn {
        display: none;
      }
      @media (max-width: 640px) {
        .edge-dashboard-btn {
          top: auto;
          bottom: calc(20px + env(safe-area-inset-bottom, 0px));
          right: calc(16px + env(safe-area-inset-right, 0px));
          left: auto;
          padding: 10px 16px;
          font-size: 13px;
          border-radius: 20px;
          box-shadow: 0 2px 12px rgba(0,0,0,0.4);
          min-height: 44px;
          min-width: 44px;
          z-index: 10000;
        }
      }

      /* Mobile optimization */
      @media (max-width: 640px) {
        /* Prevent horizontal overflow */
        body, html { overflow-x: hidden !important; }

        /* Tables scroll horizontally */
        table { font-size: 12px !important; }
        th, td { padding: 6px 8px !important; white-space: nowrap; }

        /* Cards and containers respect screen width */
        #root main, #root > div > main {
          padding-left: 12px !important;
          padding-right: 12px !important;
        }

        /* Mobile top bar logo — slightly bigger */
        .lg\\:hidden img[alt="Edge Intelligence"] {
          height: 1.5rem !important;
        }
      }
    </style>
  </head>
  <body>
    <!-- Edge logo centered top with Masters subtitle -->
    <div class="edge-top-logo">
      <div class="edge-logo-sweep">
        <img src="/masters/assets/edge-logo-new.png" alt="Edge Intelligence" />
      </div>
      <img src="/masters/assets/masters-logo-text.png" alt="Masters" class="edge-masters-logo" />
    </div>

    <!-- Dashboard button — top-right on briefing, hidden on dashboard -->
    <a href="#/overview" class="edge-dashboard-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
      </svg>
      Dashboard
    </a>

    <!-- Comet background animation -->
    <div class="bg-comets" id="comets"></div>

    <div id="root"></div>

    <!-- Edge Enhancement Layer — conviction metrics, briefing strip, focus mode -->
    <script src="/masters/assets/edge-enhance.js" defer></script>
    <!-- Benjamin Jonson Feature Block -->
    <script src="/masters/assets/benjamin-jonson.js" defer></script>

    <script>
      // Generate comet particles — 40 cyan + 10 gold (Masters)
      (function() {
        var container = document.getElementById('comets');
        var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (prefersReduced || !container) return;

        // Cyan comets
        for (var i = 0; i < 40; i++) {
          var angle = -30 - 30 * Math.random();
          var rad = angle * Math.PI / 180;
          var travel = 120 + 80 * Math.random();
          var el = document.createElement('div');
          el.className = 'comet';
          el.style.setProperty('--duration', (8 + 12 * Math.random()) + 's');
          el.style.setProperty('--delay', (30 * Math.random()) + 's');
          el.style.setProperty('--start-x', (70 * Math.random()) + '%');
          el.style.setProperty('--start-y', (50 + 50 * Math.random()) + '%');
          el.style.setProperty('--angle', angle + 'deg');
          el.style.setProperty('--travel-x', (Math.cos(rad) * travel) + 'vw');
          el.style.setProperty('--travel-y', (Math.sin(rad) * travel) + 'vh');
          container.appendChild(el);
        }

        // Gold comets
        for (var j = 0; j < 10; j++) {
          var angle2 = -20 - 140 * Math.random();
          var rad2 = angle2 * Math.PI / 180;
          var travel2 = 100 + 100 * Math.random();
          var el2 = document.createElement('div');
          el2.className = 'comet gold';
          el2.style.setProperty('--duration', (10 + 10 * Math.random()) + 's');
          el2.style.setProperty('--delay', (35 * Math.random()) + 's');
          el2.style.setProperty('--start-x', (80 * Math.random()) + '%');
          el2.style.setProperty('--start-y', (100 * Math.random()) + '%');
          el2.style.setProperty('--angle', angle2 + 'deg');
          el2.style.setProperty('--travel-x', (Math.cos(rad2) * travel2) + 'vw');
          el2.style.setProperty('--travel-y', (Math.sin(rad2) * travel2) + 'vh');
          container.appendChild(el2);
        }
      })();

      // Fade logo on scroll + hide on dashboard view
      (function() {
        var logo = document.querySelector('.edge-top-logo');
        if (!logo) return;

        // Fade out after scrolling 200px — check both window and SPA scroll container
        function onScroll() {
          var scrollTop = window.scrollY;
          // Also check SPA's own scrolling container
          var spaContainer = document.querySelector('[class*="min-h-screen"][class*="overflow"]');
          if (spaContainer && spaContainer.scrollTop > scrollTop) {
            scrollTop = spaContainer.scrollTop;
          }
          if (scrollTop > 80) {
            logo.classList.add('scrolled');
          } else {
            logo.classList.remove('scrolled');
          }
        }
        window.addEventListener('scroll', onScroll, { passive: true });
        // Observe SPA container once it mounts
        var observer = new MutationObserver(function() {
          var c = document.querySelector('[class*="min-h-screen"][class*="overflow"]');
          if (c) {
            c.addEventListener('scroll', onScroll, { passive: true });
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true, subtree: true });

        // Hide logo on dashboard pages (non-briefing hash routes)
        function checkRoute() {
          var hash = window.location.hash;
          var isBriefing = !hash || hash === '#' || hash === '#/' || hash === '#/briefing' || hash === '#/briefing/';
          if (isBriefing) {
            document.body.classList.remove('on-dashboard');
          } else {
            document.body.classList.add('on-dashboard');
          }
        }
        window.addEventListener('hashchange', checkRoute);
        checkRoute();
      })();

      // Force Edge logo 3x + stacked sidebar layout — runs continuously to catch all SPA renders
      (function() {
        function resizeAllEdgeLogos() {
          var all = document.querySelectorAll('img[alt="Edge Intelligence"]');
          for (var i = 0; i < all.length; i++) {
            var img = all[i];
            // Skip the hero/briefing logo (it's inside .edge-top-logo)
            if (img.closest('.edge-top-logo')) continue;
            // Skip mobile top bar (small logo)
            var isMobileBar = img.closest('.lg\\:hidden') || img.closest('[class*="lg:hidden"]');
            if (isMobileBar) continue;
            // Sidebar logo — make it 3x
            img.style.cssText = 'height: 10.5rem !important; width: auto !important; max-height: none !important; max-width: 200px !important; object-fit: contain !important; margin: 0 !important;';
          }
          // Force sidebar header to stack vertically with no extra padding
          var asides = document.querySelectorAll('aside');
          for (var j = 0; j < asides.length; j++) {
            var header = asides[j].querySelector(':scope > div:first-child');
            if (!header) continue;
            header.style.cssText = 'display: flex !important; flex-direction: column !important; align-items: center !important; gap: 0px !important; padding: 16px 16px 12px !important; position: relative !important;';
            // Hide the Masters 2026 / Intelligence text div (replaced by ::after)
            var textDiv = header.querySelector(':scope > div:nth-child(2)');
            if (textDiv && !textDiv.querySelector('img')) {
              textDiv.style.cssText = 'display: none !important;';
            }
            // Close button → absolute top-right
            var btn = header.querySelector(':scope > button');
            if (btn) {
              btn.style.cssText = 'position: absolute !important; top: 10px !important; right: 10px !important; margin-left: 0 !important;';
            }
          }
        }
        var root = document.getElementById('root');
        if (root) {
          new MutationObserver(resizeAllEdgeLogos).observe(root, { childList: true, subtree: true });
        }
        setInterval(resizeAllEdgeLogos, 300);
      })();
    </script>
  </body>
</html>
